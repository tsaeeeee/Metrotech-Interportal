<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rack Builder Pro</title>

<style>
body {
  font-family: Arial;
  display: flex;
  gap: 20px;
  padding: 20px;
  background: #eef1f5;
}

/* Sidebar */
.sidebar {
  width: 240px;
  height: 550px;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.item {
  padding: 0px;
  margin: 8px 0;
  color: white;
  border-radius: 6px;
  cursor: grab;
  text-align: center;
}

/* Height per unit size */
.item[data-size="1"] { height: 20px; line-height: 20px; }
.item[data-size="2"] { height: 40px; line-height: 40px; }
.item[data-size="4"] { height: 80px; line-height: 80px; }

.router { background: #e74c3c; }
.switch { background: #3498db; }
.server { background: #2ecc71; }

/* Rack */
.wrapper {
  display: flex;
  flex-direction: row; /* horizontal racks */
  gap: 20px;
}

.controls{
  margin-top: 30px;
}

.controls button {
  margin-right: 10px;
}

.rack-wrapper {
  display: inline-block;
  position: relative;
  margin: 20px; /* spacing for stroke */
}

.rack {
  width: 320px;
  background: #222;
  position: relative;
  border-radius: 5px;
  overflow: hidden;
  box-shadow: 0 0 0 20px white; /* stroke */
}

.slot {
  height: 19px;
  border-bottom: 1px solid #444;
  position: relative;
}

.label {
  position: absolute;
  left: -40px;
  font-size: 10px;
  color: #888;
}

/* Components */
.component {
  position: absolute;
  width: 100%;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: move;
  border: 1px solid black;
  font-size: 12px;
}

/* Rear view style */
.rear .component {
  filter: brightness(0.7);
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Components</h3>

  <div class="item router" draggable="true" data-type="Router" data-size="1">Router 1U</div>
  <div class="item router" draggable="true" data-type="Router" data-size="2">Router 2U</div>
  <div class="item router" draggable="true" data-type="Router" data-size="4">Router 4U</div>

  <div class="item switch" draggable="true" data-type="Switch" data-size="1">Switch 1U</div>
  <div class="item switch" draggable="true" data-type="Switch" data-size="2">Switch 2U</div>
  <div class="item switch" draggable="true" data-type="Switch" data-size="4">Switch 4U</div>

  <div class="item server" draggable="true" data-type="Server" data-size="1">Server 1U</div>
  <div class="item server" draggable="true" data-type="Server" data-size="2">Server 2U</div>
  <div class="item server" draggable="true" data-type="Server" data-size="4">Server 4U</div>
  
  <div class="controls">
    <button onclick="saveLayout()">Save</button>
    <button onclick="loadLayout()">Load</button>
    <button onclick="clearRack()">Clear</button>
  </div>
</div>

<div class="wrapper">
  <!-- Rack 52U -->
  <div class="rack-wrapper">
    <div class="rack" id="rack-52" style="height:1040px;"></div>
  </div>
  <!-- Rack 48U -->
  <div class="rack-wrapper">
    <div class="rack" id="rack-48" style="height:912px;"></div>
  </div>
  <!-- Rack 42U -->
  <div class="rack-wrapper">
    <div class="rack" id="rack-42" style="height:798px;"></div>
  </div>
</div>

<script>
const U =20; // slot height
const racks = [
  { id: "rack-52", total: 52, components: [] },
  { id: "rack-48", total: 48, components: [] },
  { id: "rack-42", total: 42, components: [] }
];

let dragging = null;

/* Build slots for each rack */
racks.forEach(rackObj => {
  const rackEl = document.getElementById(rackObj.id);
  for(let i = rackObj.total; i >= 1; i--) {
    const slot = document.createElement("div");
    slot.className = "slot";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = i + "U";

    slot.appendChild(label);
    rackEl.appendChild(slot);
  }

  rackEl.addEventListener("dragover", e => e.preventDefault());

  rackEl.addEventListener("drop", e => handleDrop(e, rackObj));
});

/* Drag from sidebar */
document.querySelectorAll(".item").forEach(el => {
  el.addEventListener("dragstart", e => {
    e.dataTransfer.setData("type", el.dataset.type);
    e.dataTransfer.setData("size", el.dataset.size);
    e.dataTransfer.setData("color", getComputedStyle(el).backgroundColor);
  });
});

/* Collision detection */
function isFree(start, size, rackObj, ignoreId=null) {
  for (let c of rackObj.components) {
    if (c.id === ignoreId) continue;
    if (!(start + size <= c.start || start >= c.start + c.size)) {
      return false;
    }
  }
  return start + size <= rackObj.total;
}

/* Auto find nearest free slot */
function findSlot(start, size, rackObj) {
  for (let i = start; i <= rackObj.total; i++) {
    if (isFree(i, size, rackObj)) return i;
  }
  for (let i = start; i >= 0; i--) {
    if (isFree(i, size, rackObj)) return i;
  }
  return null;
}

/* Create component */
function createComponent(type, size, color, start, rackObj, labelText=null, id=null) {
  const comp = document.createElement("div");
  comp.className = "component";

  const newId = id || Date.now();
  comp.dataset.id = newId;

  const finalStart = findSlot(start, size, rackObj);
  if (finalStart === null) return;

  const rackEl = document.getElementById(rackObj.id);
  comp.style.top = (finalStart * U) + "px";
  comp.style.height = (size * U) + "px";
  comp.style.background = color;
  comp.innerText = labelText || `${type} (${size}U)`;
  comp.draggable = true;

  /* Rename */
  comp.addEventListener("click", () => {
    const name = prompt("Rename component:", comp.innerText);
    if (name) comp.innerText = name;
  });

  /* Delete */
  comp.addEventListener("dblclick", () => {
    rackObj.components = rackObj.components.filter(c => c.id != newId);
    comp.remove();
  });

  /* Drag move */
  comp.addEventListener("dragstart", e => {
    dragging = comp;
    e.dataTransfer.setData("move", "1");
    e.dataTransfer.setData("id", newId);
    e.dataTransfer.setData("offsetY", e.offsetY);
    e.dataTransfer.setData("rackId", rackObj.id);
  });

  rackEl.appendChild(comp);

  rackObj.components.push({
    id: newId,
    type,
    size,
    start: finalStart,
    color,
    label: comp.innerText
  });
}

/* Drop handler */
function handleDrop(e, rackObj) {
  e.preventDefault();

  const rackEl = document.getElementById(rackObj.id);

  if (e.dataTransfer.getData("move")) {
    const comp = dragging;
    const id = parseInt(e.dataTransfer.getData("id"));
    const offset = parseInt(e.dataTransfer.getData("offsetY"));
    const originRackId = e.dataTransfer.getData("rackId");
    const originRackObj = racks.find(r => r.id === originRackId);

    let obj = originRackObj.components.find(c => c.id === id);
    if (!obj) return;

    const rect = rackEl.getBoundingClientRect();
    let y = e.clientY - rect.top - offset;
    let start = Math.round(y / U);

    const newStart = findSlot(start, obj.size, rackObj);
    if (newStart === null) return;

    // Remove from origin if different rack
    if (originRackId !== rackObj.id) {
      originRackObj.components = originRackObj.components.filter(c => c.id !== id);
      comp.remove();
      createComponent(obj.type, obj.size, obj.color, newStart, rackObj, obj.label, obj.id);
    } else {
      comp.style.top = (newStart * U) + "px";
      obj.start = newStart;
    }

  } else {
    const type = e.dataTransfer.getData("type");
    const size = parseInt(e.dataTransfer.getData("size"));
    const color = e.dataTransfer.getData("color");

    const rect = rackEl.getBoundingClientRect();
    let start = Math.floor((e.clientY - rect.top) / U);

    createComponent(type, size, color, start, rackObj);
  }
}

/* Save / Load */
function saveLayout() {
  const allData = racks.map(r => ({ id: r.id, components: r.components }));
  localStorage.setItem("rackLayout", JSON.stringify(allData));
  alert("Saved!");
}

function loadLayout() {
  clearRack();
  const data = JSON.parse(localStorage.getItem("rackLayout") || "[]");
  data.forEach(rData => {
    const rackObj = racks.find(r => r.id === rData.id);
    rData.components.forEach(c => {
      createComponent(c.type, c.size, c.color, c.start, rackObj, c.label, c.id);
    });
  });
}

/* Clear all racks */
function clearRack() {
  racks.forEach(r => {
    r.components = [];
    const rackEl = document.getElementById(r.id);
    rackEl.querySelectorAll(".component").forEach(c => c.remove());
  });
}
</script>

</body>
</html>
