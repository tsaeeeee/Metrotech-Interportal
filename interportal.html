<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rack Builder Pro</title>
<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  gap: 20px;
  padding: 20px;
  background: #eef1f5;
}

/* Sidebar */
.sidebar {
  width: 260px;
  height: 600px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.sidebar h3 {
  margin-bottom: 10px;
}

.selection-page {
  display: none;
  flex-direction: column;
  gap: 10px;
}

.selection-page.active {
  display: flex;
}

.item {
  padding: 8px;
  color: white;
  border-radius: 6px;
  cursor: grab;
  text-align: center;
}

.item[data-size="1"] { height: 20px; line-height: 20px; }
.item[data-size="2"] { height: 40px; line-height: 40px; }
.item[data-size="4"] { height: 80px; line-height: 80px; }

.router { background: #e74c3c; }
.switch { background: #3498db; }
.server { background: #2ecc71; }

/* Rack wrapper */
.wrapper {
  display: flex;
  flex-direction: column;
  gap: 20px;
  flex: 1;
}

/* Rack */
.rack-wrapper {
  position: relative;
  display: inline-block;
}

.rack {
  width: 320px;
  background: #222;
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 0 20px white; /* stroke */
}

.slot {
  height: 20px;
  border-bottom: 1px solid #444;
  position: relative;
}

.label {
  position: absolute;
  left: -40px;
  font-size: 10px;
  color: #888;
}

/* Component */
.component {
  position: absolute;
  width: 100%;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: move;
  border: 1px solid black;
  font-size: 12px;
}

/* Controls */
.controls button {
  margin-right: 10px;
}

/* Rack Name Input */
.rack-name {
  margin-bottom: 5px;
  padding: 5px;
  font-size: 14px;
  width: 100%;
  box-sizing: border-box;
}
</style>
</head>
<body>

<div class="sidebar">
  <h3>Rack Builder</h3>

  <!-- Step 1: Select Rack -->
  <div class="selection-page" id="rack-selection">
    <h4>Select Rack Size</h4>
    <button onclick="selectRack(42)">Rack 42U</button>
    <button onclick="selectRack(48)">Rack 48U</button>
    <button onclick="selectRack(52)">Rack 52U</button>
  </div>

  <!-- Step 2: Select Component -->
  <div class="selection-page" id="component-selection">
    <h4>Select Component</h4>

    <div class="item router" draggable="true" data-type="Router" data-size="1">Router 1U</div>
    <div class="item router" draggable="true" data-type="Router" data-size="2">Router 2U</div>
    <div class="item router" draggable="true" data-type="Router" data-size="4">Router 4U</div>

    <div class="item switch" draggable="true" data-type="Switch" data-size="1">Switch 1U</div>
    <div class="item switch" draggable="true" data-type="Switch" data-size="2">Switch 2U</div>
    <div class="item switch" draggable="true" data-type="Switch" data-size="4">Switch 4U</div>

    <div class="item server" draggable="true" data-type="Server" data-size="1">Server 1U</div>
    <div class="item server" draggable="true" data-type="Server" data-size="2">Server 2U</div>
    <div class="item server" draggable="true" data-type="Server" data-size="4">Server 4U</div>

    <div class="controls">
      <button onclick="saveLayout()">Save</button>
      <button onclick="loadLayout()">Load</button>
      <button onclick="clearRack()">Clear</button>
    </div>
  </div>
</div>

<div class="wrapper" id="rack-container">
  <!-- Rack will appear here -->
</div>

<script>
const U = 20;
let currentRack = null;
let dragging = null;

// Show initial page
document.getElementById("rack-selection").classList.add("active");

// Step 1: Select Rack
function selectRack(size) {
  const wrapper = document.getElementById("rack-container");
  wrapper.innerHTML = ""; // clear previous rack

  const rackWrapper = document.createElement("div");
  rackWrapper.className = "rack-wrapper";

  // Rack name input
  const nameInput = document.createElement("input");
  nameInput.className = "rack-name";
  nameInput.placeholder = "Enter Rack Name";
  rackWrapper.appendChild(nameInput);

  const rack = document.createElement("div");
  rack.className = "rack";
  rack.style.height = `${size * U}px`;
  rackWrapper.appendChild(rack);
  wrapper.appendChild(rackWrapper);

  // Build slots
  for(let i=size; i>=1; i--) {
    const slot = document.createElement("div");
    slot.className = "slot";
    const label = document.createElement("div");
    label.className = "label";
    label.innerText = i + "U";
    slot.appendChild(label);
    rack.appendChild(slot);
  }

  currentRack = {
    el: rack,
    total: size,
    components: []
  };

  // Enable drop
  rack.addEventListener("dragover", e => e.preventDefault());
  rack.addEventListener("drop", e => handleDrop(e, currentRack));

  // Switch to component selection
  document.getElementById("rack-selection").classList.remove("active");
  document.getElementById("component-selection").classList.add("active");
}

// Drag from sidebar
document.querySelectorAll(".item").forEach(el => {
  el.addEventListener("dragstart", e => {
    e.dataTransfer.setData("type", el.dataset.type);
    e.dataTransfer.setData("size", el.dataset.size);
    e.dataTransfer.setData("color", getComputedStyle(el).backgroundColor);
  });
});

// Collision detection
function isFree(start, size, rackObj, ignoreId=null) {
  for (let c of rackObj.components) {
    if (c.id === ignoreId) continue;
    if (!(start + size <= c.start || start >= c.start + c.size)) return false;
  }
  return start + size <= rackObj.total;
}

function findSlot(start, size, rackObj) {
  for (let i = start; i <= rackObj.total; i++) {
    if (isFree(i, size, rackObj)) return i;
  }
  for (let i = start; i >= 0; i--) {
    if (isFree(i, size, rackObj)) return i;
  }
  return null;
}

// Create component
function createComponent(type, size, color, start, rackObj, labelText=null, id=null) {
  const comp = document.createElement("div");
  comp.className = "component";
  const newId = id || Date.now();
  comp.dataset.id = newId;

  const finalStart = findSlot(start, size, rackObj);
  if (finalStart === null) return;

  const rackEl = rackObj.el;
  comp.style.top = (finalStart * U) + "px";
  comp.style.height = (size * U) + "px";
  comp.style.background = color;
  comp.innerText = labelText || `${type} (${size}U)`;
  comp.draggable = true;

  // Rename
  comp.addEventListener("click", () => {
    const name = prompt("Rename component:", comp.innerText);
    if (name) comp.innerText = name;
  });

  // Delete
  comp.addEventListener("dblclick", () => {
    rackObj.components = rackObj.components.filter(c => c.id != newId);
    comp.remove();
  });

  // Drag move
  comp.addEventListener("dragstart", e => {
    dragging = comp;
    e.dataTransfer.setData("move", "1");
    e.dataTransfer.setData("id", newId);
    e.dataTransfer.setData("offsetY", e.offsetY);
  });

  rackEl.appendChild(comp);

  rackObj.components.push({
    id: newId,
    type,
    size,
    start: finalStart,
    color,
    label: comp.innerText
  });
}

// Drop handler
function handleDrop(e, rackObj) {
  e.preventDefault();
  const rackEl = rackObj.el;

  if (e.dataTransfer.getData("move")) {
    const comp = dragging;
    const id = parseInt(e.dataTransfer.getData("id"));
    const offset = parseInt(e.dataTransfer.getData("offsetY"));
    const obj = rackObj.components.find(c => c.id === id);
    if (!obj) return;

    const rect = rackEl.getBoundingClientRect();
    let y = e.clientY - rect.top - offset;
    let start = Math.round(y / U);
    const newStart = findSlot(start, obj.size, rackObj);
    if (newStart === null) return;

    comp.style.top = (newStart * U) + "px";
    obj.start = newStart;
  } else {
    const type = e.dataTransfer.getData("type");
    const size = parseInt(e.dataTransfer.getData("size"));
    const color = e.dataTransfer.getData("color");
    const rect = rackEl.getBoundingClientRect();
    let start = Math.floor((e.clientY - rect.top) / U);
    createComponent(type, size, color, start, rackObj);
  }
}

// Save / Load / Clear
function saveLayout() {
  if (!currentRack) return alert("No rack to save");
  const data = {
    name: document.querySelector(".rack-name").value,
    total: currentRack.total,
    components: currentRack.components
  };
  localStorage.setItem("rackLayout", JSON.stringify(data));
  alert("Saved!");
}

function loadLayout() {
  const data = JSON.parse(localStorage.getItem("rackLayout") || "{}");
  if (!data.total) return alert("No saved layout");

  selectRack(data.total);
  document.querySelector(".rack-name").value = data.name;

  data.components.forEach(c => {
    createComponent(c.type, c.size, c.color, c.start, currentRack, c.label, c.id);
  });
}

function clearRack() {
  if (!currentRack) return;
  currentRack.components = [];
  currentRack.el.querySelectorAll(".component").forEach(c => c.remove());
}
</script>

</body>
</html>
